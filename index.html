<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARF Studio - Linktree</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111, #222);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .profile img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid #00ffcc;
      margin-bottom: 10px;
    }

    .profile h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .profile p {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 20px;
    }

    .links a {
      display: block;
      background: #00ffcc;
      color: #000;
      text-decoration: none;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    .links a:hover {
      background: #00c9a7;
      transform: scale(1.03);
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <img src="assets/Logo.png" alt="ARF Studio" />
      <h1>ARF Studio</h1>
      <p>Digital Creative • Web Developer • Designer</p>
    </div>

    <div class="links">
     <a href="https://www.fiverr.com/s/dD4lmaz" target="_blank">
    💼 Fiverr Profile
     </a>
     <a href="https://www.instagram.com/arfstudio.02">
        <i class="fa-brands fa-instagram"></i> Instagram
     </a>
     <a href="https://wa.me/6285791630296" target="_blank">
        <i class="fa-brands fa-whatsapp"></i> WhatsApp
     </a>
    </div>

    <footer>
      © 2026 ARF Studio. All Rights Reserved.
    </footer>
  </div>
</body>
</html>
